<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --text-main: #e6f1ff;
            --text-secondary: #8892b0;
            --accent-color: #64ffda;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(100, 255, 218, 0.03), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(100, 255, 218, 0.04), transparent 25%);
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
            animation: fadeIn 1s ease-out forwards;
        }

        .avatar {
            width: 120px;
            height: 120px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            background: linear-gradient(145deg, #112240, #0a192f);
            border: 2px solid rgba(100, 255, 218, 0.5);
            box-shadow: 0 0 20px rgba(100, 255, 218, 0.2), inset 0 0 15px rgba(100, 255, 218, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .avatar::after {
            content: '';
            position: absolute;
            top: -6px; left: -6px; right: -6px; bottom: -6px;
            border-radius: 50%;
            border: 1px dashed var(--accent-color);
            opacity: 0;
            transition: opacity 0.4s ease;
            animation: spin 10s linear infinite;
        }

        .avatar:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 0 30px rgba(100, 255, 218, 0.4), inset 0 0 20px rgba(100, 255, 218, 0.2);
            border-color: var(--accent-color);
        }

        .avatar:hover::after {
            opacity: 0.5;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: 1px;
        }

        .intro {
            font-size: 1.1rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
        }

        .btn {
            padding: 0.8rem 2rem;
            font-size: 1rem;
            font-family: monospace;
            color: var(--accent-color);
            background: transparent;
            border: 1px solid var(--accent-color);
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--accent-color);
            transition: all 0.3s ease;
            z-index: -1;
        }

        .btn:hover {
            color: var(--bg-color);
            box-shadow: 0 0 15px rgba(100, 255, 218, 0.5);
        }

        .btn:hover::before {
            left: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* 响应式设计 */
        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
            .intro { font-size: 1rem; }
            .actions {
                flex-direction: column;
                gap: 1rem;
            }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar">
            <span>[头像]</span>
        </div>
        <h1>你的名字</h1>
        <p class="intro">
            你好，我是一名探索数字边界的开发者。<br>
            专注于极简设计与硬核逻辑的融合，致力于编写高效、优雅的代码。
        </p>
        <div class="actions">
            <button class="btn">&lt;我的项目 /&gt;</button>
            <button class="btn">联系我()</button>
        </div>
    </div>
</body>
</html>
